  <rect class="page" width="1600" height="900"/>

  <text class="title" x="800" y="52" text-anchor="middle">EntityQ Financial Entity Data Quality &amp; Automation Framework</text>
  <text class="subtitle" x="800" y="82" text-anchor="middle">A practical framework for profiling, validating, remediating, and exposing financial entity and reference data quality outputs.</text>

  <rect class="section-bg" x="32" y="116" width="246" height="666"/>
  <rect class="section-bg" x="304" y="116" width="300" height="666"/>
  <rect class="section-bg" x="630" y="116" width="300" height="666"/>
  <rect class="section-bg" x="956" y="116" width="274" height="666"/>
  <rect class="section-bg" x="1256" y="116" width="312" height="666"/>

  <text class="section-title" x="155" y="145" text-anchor="middle">1. DATA SOURCES</text>
  <text class="section-title" x="454" y="145" text-anchor="middle">2. PROCESSING &amp; QUALITY ENGINE</text>
  <text class="section-title" x="780" y="145" text-anchor="middle">3. STORAGE &amp; QUALITY OUTPUTS</text>
  <text class="section-title" x="1093" y="145" text-anchor="middle">4. MODELLING &amp; ACCESS</text>
  <text class="section-title" x="1412" y="145" text-anchor="middle">5. POSITIONING / GOVERNANCE</text>

  <!-- Data sources -->
  <rect class="box source" x="58" y="180" width="194" height="132"/>
  <text class="box-title" x="155" y="205" text-anchor="middle">Synthetic Financial</text>
  <text class="box-title" x="155" y="223" text-anchor="middle">Entity &amp; Reference Data</text>
  <text class="box-sub" x="76" y="250">- entities.csv</text>
  <text class="box-sub" x="76" y="267">- issuers.csv</text>
  <text class="box-sub" x="76" y="284">- hierarchy.csv</text>
  <text class="box-sub" x="76" y="301">- kyc_attributes.csv</text>
  <text class="box-sub" x="76" y="318">- provider_feed.csv</text>

  <rect class="box source" x="58" y="374" width="194" height="118"/>
  <text class="box-title" x="155" y="400" text-anchor="middle">New Dirty Dataset</text>
  <text class="box-sub" x="76" y="428">- counterparty_trade_links.csv</text>
  <text class="box-sub" x="76" y="447">- trade-linked counterparty,</text>
  <text class="box-sub" x="76" y="464">  issuer, KYC, risk, and</text>
  <text class="box-sub" x="76" y="481">  provider data</text>

  <rect class="box source" x="58" y="562" width="194" height="112"/>
  <text class="box-title" x="155" y="588" text-anchor="middle">Streaming Provider</text>
  <text class="box-title" x="155" y="606" text-anchor="middle">Feed Demo</text>
  <text class="box-sub" x="76" y="634">- provider-feed-raw Kafka topic</text>
  <text class="box-sub" x="76" y="653">- simulated third-party</text>
  <text class="box-sub" x="76" y="670">  provider events</text>

  <!-- Processing -->
  <rect class="box process" x="334" y="168" width="240" height="142"/>
  <text class="box-title" x="454" y="194" text-anchor="middle">EntityQ Core Python Pipeline</text>
  <text class="box-sub" x="354" y="221">- data generation</text>
  <text class="box-sub" x="354" y="238">- data profiling</text>
  <text class="box-sub" x="354" y="255">- validation rules</text>
  <text class="box-sub" x="354" y="272">- quality scorecards</text>
  <text class="box-sub" x="354" y="289">- anomaly detection</text>
  <text class="box-sub" x="354" y="306">- stakeholder report</text>

  <rect class="box process" x="334" y="342" width="240" height="126"/>
  <text class="box-title" x="454" y="368" text-anchor="middle">New Dataset Onboarding</text>
  <text class="box-sub" x="354" y="395">- dataset registry</text>
  <text class="box-sub" x="354" y="412">- schema checks</text>
  <text class="box-sub" x="354" y="429">- column profiling</text>
  <text class="box-sub" x="354" y="446">- rule-level validation</text>
  <text class="box-sub" x="354" y="463">- failed-record exceptions</text>

  <rect class="box process" x="334" y="492" width="240" height="132"/>
  <text class="box-title" x="454" y="518" text-anchor="middle">SQL Quality Checks</text>
  <text class="box-title" x="454" y="536" text-anchor="middle">&amp; Remediation</text>
  <text class="box-sub" x="354" y="563">- DuckDB SQL checks</text>
  <text class="box-sub" x="354" y="580">- business rules</text>
  <text class="box-sub" x="354" y="597">- curation logic</text>
  <text class="box-sub" x="354" y="614">- quarantine logic</text>
  <text class="box-sub" x="354" y="631">- remediation summary</text>

  <rect class="box process" x="334" y="648" width="240" height="106"/>
  <text class="box-title" x="454" y="674" text-anchor="middle">Kafka Producer &amp; Consumer</text>
  <text class="box-sub" x="354" y="701">- publish provider events</text>
  <text class="box-sub" x="354" y="718">- consume provider events</text>
  <text class="box-sub" x="354" y="735">- validate streaming records</text>
  <text class="box-sub" x="354" y="752">- provider quality summary</text>

  <!-- Storage -->
  <rect class="box storage" x="660" y="166" width="112" height="82"/>
  <text class="box-title" x="716" y="194" text-anchor="middle">data/raw</text>
  <text class="box-sub" x="675" y="221">- synthetic raw</text>
  <text class="box-sub" x="675" y="238">  CSV datasets</text>

  <rect class="box storage" x="788" y="166" width="112" height="82"/>
  <text class="box-title" x="844" y="194" text-anchor="middle">data/processed</text>
  <text class="box-sub" x="803" y="221">- DuckDB store</text>
  <text class="box-sub" x="803" y="238">- entityq.duckdb</text>

  <rect class="box storage" x="660" y="274" width="240" height="150"/>
  <text class="box-title" x="780" y="302" text-anchor="middle">data/quality_reports</text>
  <text class="box-sub" x="680" y="329">- profiling summaries</text>
  <text class="box-sub" x="680" y="346">- validation outputs</text>
  <text class="box-sub" x="680" y="363">- rule results and scorecards</text>
  <text class="box-sub" x="680" y="380">- stakeholder_report.md</text>
  <text class="box-sub" x="680" y="397">- kafka_provider_quality_summary.csv</text>
  <text class="box-sub" x="680" y="414">- kafka_provider_failed_events.csv</text>

  <rect class="box storage" x="660" y="454" width="112" height="92"/>
  <text class="box-title" x="716" y="482" text-anchor="middle">data/curated</text>
  <text class="box-sub" x="675" y="509">- valid trade</text>
  <text class="box-sub" x="675" y="526">  records</text>
  <text class="box-sub" x="675" y="543">- accepted output</text>

  <rect class="box storage" x="788" y="454" width="112" height="92"/>
  <text class="box-title" x="844" y="482" text-anchor="middle">data/quarantine</text>
  <text class="box-sub" x="803" y="509">- failed records</text>
  <text class="box-sub" x="803" y="526">- suspicious rows</text>
  <text class="box-sub" x="803" y="543">- review queue</text>

  <rect class="box storage" x="660" y="652" width="240" height="82"/>
  <text class="box-title" x="780" y="680" text-anchor="middle">data/streaming</text>
  <text class="box-sub" x="680" y="707">- consumed Kafka events</text>
  <text class="box-sub" x="680" y="724">- run metadata</text>

  <!-- Modelling and access -->
  <rect class="box access" x="986" y="180" width="214" height="118"/>
  <text class="box-title" x="1093" y="206" text-anchor="middle">dbt + DuckDB</text>
  <text class="box-title" x="1093" y="224" text-anchor="middle">Modelling Layer</text>
  <text class="box-sub" x="1006" y="251">- staging models</text>
  <text class="box-sub" x="1006" y="268">- mart summaries</text>
  <text class="box-sub" x="1006" y="285">- data quality views</text>
  <text class="box-sub" x="1006" y="302">- dbt tests</text>

  <rect class="box access" x="986" y="368" width="214" height="118"/>
  <text class="box-title" x="1093" y="394" text-anchor="middle">FastAPI Service</text>
  <text class="box-sub" x="1006" y="421">- quality summaries API</text>
  <text class="box-sub" x="1006" y="438">- failed rules API</text>
  <text class="box-sub" x="1006" y="455">- anomaly results API</text>
  <text class="box-sub" x="1006" y="472">- downstream access</text>

  <rect class="box access" x="986" y="556" width="214" height="112"/>
  <text class="box-title" x="1093" y="582" text-anchor="middle">Streamlit Dashboard</text>
  <text class="box-sub" x="1006" y="609">- data quality monitoring</text>
  <text class="box-sub" x="1006" y="626">- failed-record review</text>
  <text class="box-sub" x="1006" y="643">- stakeholder visibility</text>

  <!-- Governance -->
  <rect class="box governance" x="1286" y="188" width="252" height="386"/>
  <text class="callout-title" x="1412" y="218" text-anchor="middle">Positioning</text>
  <text class="callout-copy" x="1310" y="252">EntityQ demonstrates practical</text>
  <text class="callout-copy" x="1310" y="271">experience in financial data</text>
  <text class="callout-copy" x="1310" y="290">quality management, entity and</text>
  <text class="callout-copy" x="1310" y="309">reference data validation,</text>
  <text class="callout-copy" x="1310" y="328">SQL-based quality checks,</text>
  <text class="callout-copy" x="1310" y="347">automation, remediation</text>
  <text class="callout-copy" x="1310" y="366">workflows, Kafka provider-feed</text>
  <text class="callout-copy" x="1310" y="385">simulation, dbt/DuckDB</text>
  <text class="callout-copy" x="1310" y="404">modelling, API access, and</text>
  <text class="callout-copy" x="1310" y="423">stakeholder reporting.</text>
  <line x1="1310" y1="454" x2="1514" y2="454" stroke="#cbd5e1" stroke-width="1"/>
  <text class="callout-title" x="1412" y="486" text-anchor="middle">Professional Story</text>
  <text class="callout-copy" x="1310" y="518">Ingest dirty data, detect failures,</text>
  <text class="callout-copy" x="1310" y="537">separate curated and quarantined</text>
  <text class="callout-copy" x="1310" y="556">records, then expose trusted</text>
  <text class="callout-copy" x="1310" y="575">outputs for technical and business</text>
  <text class="callout-copy" x="1310" y="594">stakeholders.</text>

